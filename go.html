<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Deschide Viralio</title>
</head>
<body>
<script>
    const url = 'https://viralio.ro/?open_login=1';
    // Incearca sa deschida in browser extern
    window.location.href = 'googlechrome://navigate?url=' + encodeURIComponent(url);
    setTimeout(() => {
        window.location.href = 'x-web-search://?q=' + encodeURIComponent(url);
    }, 500);
    setTimeout(() => {
        window.location.href = url;
    }, 1000);
</script>
<style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #09090b; color: white; text-align: center; padding: 20px; }
    .btn { margin-top: 24px; padding: 16px 32px; background: linear-gradient(to right, #4f46e5, #ec4899); color: white; font-weight: 900; border-radius: 16px; text-decoration: none; font-size: 1rem; }
</style>
<p style="font-size:1.1rem; font-weight:700;">Apasă butonul de mai jos pentru a deschide Viralio în browser</p>
<a class="btn" href="https://viralio.ro/?open_login=1">Deschide în Browser →</a>
</body>
</html>
